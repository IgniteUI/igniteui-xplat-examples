<!-- ifdef webgrids -->
<div class="container vertical sample ig-typography">
<!-- endifdef webgrids -->
<!-- ifdef not webgrids -->
<div class="container vertical sample">
<!-- endifdef not webgrids -->
<!-- ifdef editor -->
  <div class="options vertical">
      <!-- insert editor -->
      <!-- end editor -->
  </div>
<!-- endifdef editor -->
<!-- ifdef legendTitle -->
  <div class="legend-title">
      $$legendTitle
  </div>
<!-- endifdef legendTitle -->
<!-- ifdef legend -->
  <div class="legend">
      <!-- insert legend -->
      <!-- end legend -->
  </div>
<!-- endifdef legend -->
<!-- ifdef aboveContent -->
  <div class="aboveContent">
    <!-- insert aboveContent -->
    <!-- end aboveContent -->
  </div>
<!-- endifdef aboveContent -->
<!-- ifdef aboveContentLeft, aboveContentRight -->
  <div class="aboveContentSplit">
    <div class="aboveContentLeftContainer">
      <!-- insert aboveContentLeft -->
      <!-- end aboveContentLeft -->
    </div>
    <div class="aboveContentRightContainer">
      <!-- insert aboveContentRight -->
      <!-- end aboveContentRight -->
    </div>
  </div>
<!-- endifdef aboveContentLeft, aboveContentRight -->
<!-- ifdef leftContent, rightContent -->
  <div class="contentSplit">
<!-- endifdef leftContent, rightContent -->
<!-- ifdef leftContent -->
    <div class="leftContentContainer">
      <!-- insert leftContent -->
      <!-- end leftContent -->
    </div>
<!-- endifdef leftContent -->
  <div class="container fill">
      <!-- insert content -->
      <igx-category-chart
        yAxisMinimumValue="0"
        [dataSource]="data" >
      </igx-category-chart>
      <!-- end content -->
  </div>
<!-- ifdef rightContent -->
    <div class="rightContentContainer">
      <!-- insert rightContent -->
      <!-- end rightContent -->
    </div>
<!-- endifdef rightContent -->
<!-- ifdef leftContent, rightContent -->
  </div>
<!-- endifdef leftContent, rightContent -->
<!-- ifdef belowContent -->
  <div class="belowContent">
    <!-- insert belowContent -->
    <!-- end belowContent -->
  </div>
<!-- endifdef belowContent -->
</div>
